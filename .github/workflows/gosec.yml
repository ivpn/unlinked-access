name: Gosec
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Pull changes from PR branch
        run: git pull origin ${{ github.event.pull_request.head.ref }}
      - name: Install gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run Gosec Security Scanner
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          find . -name 'go.mod' -exec dirname {} \; | grep -v '^./proto$' | while read module_dir; do
            echo "Running gosec in $module_dir"
            (cd "$module_dir" && gosec -exclude=G402,G404 -exclude-dir=proto ./...)
          done